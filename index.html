<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Page</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .card {
      border: 1px solid #bdbdbd;
      border-radius: 12px;
      padding: 1.25rem;
      background: rgba(255, 255, 255, 0.04);
    }

    h1 {
      margin-top: 0;
    }

    fieldset {
      border: none;
      padding: 0;
      margin: 0 0 1rem;
    }

    legend {
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.35rem;
    }

    button {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 1px solid #888;
      background: transparent;
      cursor: pointer;
    }

    .small {
      font-size: 0.9rem;
      color: #666;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Quick Survey</h1>
    <p class="small">One survey is selected once and remembered in your browser cache.</p>

    <section id="survey-1" class="hidden" aria-live="polite">
      <h2>Survey 1</h2>
      <p>Please complete this survey:</p>
      <p>
        <a href="https://forms.office.com/Pages/DesignPageV2.aspx?subpage=design&FormId=JsKqeAMvTUuQN7RtVsVSEKEvgx6hsqFLiBFsa9IFikVUMjdXTUwySzVDQkQzWk1GWEJZRVBYRko4Si4u&Token=96755704078e43e7bf0a2f0dda7d2e90" target="_blank" rel="noopener noreferrer">
          Open Survey 1
        </a>
      </p>
    </section>

    <section id="survey-2" class="hidden" aria-live="polite">
      <h2>Survey 2</h2>
      <p>Please complete this survey:</p>
      <p>
        <a href="https://forms.office.com/Pages/DesignPageV2.aspx?subpage=design&FormId=JsKqeAMvTUuQN7RtVsVSEKEvgx6hsqFLiBFsa9IFikVUREE3Q0FPR1VUMjVNRkk0TEVMUEw3WVBDMC4u&Token=443bbb69e51e44b1a7328b9ee9bd7e76" target="_blank" rel="noopener noreferrer">
          Open Survey 2
        </a>
      </p>
    </section>

    <section id="survey-3" class="hidden" aria-live="polite">
      <h2>Survey 3</h2>
      <p>Please complete this survey:</p>
      <p>
        <a href="https://forms.office.com/Pages/DesignPageV2.aspx?subpage=design&FormId=JsKqeAMvTUuQN7RtVsVSEKEvgx6hsqFLiBFsa9IFikVUMEhKVkJGWVhVWjdTODdJWU43VURUNzFDWS4u&Token=e15a8711a57547c9b91dfe7a0eae2f08" target="_blank" rel="noopener noreferrer">
          Open Survey 3
        </a>
      </p>
    </section>
  </main>

  <script>
    (function () {
      const CACHE_KEY = 'selectedSurveyId';
      const surveys = ['survey-1', 'survey-2', 'survey-3'];

      function getRandomSurveyId() {
        const index = Math.floor(Math.random() * surveys.length);
        return surveys[index];
      }

      function getOrCreateSurveyId() {
        const cachedSurveyId = localStorage.getItem(CACHE_KEY);

        if (cachedSurveyId && surveys.includes(cachedSurveyId)) {
          return cachedSurveyId;
        }

        const newSurveyId = getRandomSurveyId();
        localStorage.setItem(CACHE_KEY, newSurveyId);
        return newSurveyId;
      }

      function showSurvey(surveyId) {
        for (const id of surveys) {
          const section = document.getElementById(id);
          if (!section) continue;

          if (id === surveyId) {
            section.classList.remove('hidden');
          } else {
            section.classList.add('hidden');
          }
        }
      }

      const surveyIdToShow = getOrCreateSurveyId();
      showSurvey(surveyIdToShow);
    })();
  </script>
</body>
</html>
