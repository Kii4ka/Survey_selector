<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Page</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .card {
      border: 1px solid #bdbdbd;
      border-radius: 12px;
      padding: 1.25rem;
      background: rgba(255, 255, 255, 0.04);
    }

    h1 {
      margin-top: 0;
    }

    fieldset {
      border: none;
      padding: 0;
      margin: 0 0 1rem;
    }

    legend {
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.35rem;
    }

    button {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 1px solid #888;
      background: transparent;
      cursor: pointer;
    }

    .small {
      font-size: 0.9rem;
      color: #666;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Quick Survey</h1>
 

    <section id="survey-1" class="hidden" aria-live="polite">
     
      <p>Please complete this survey:</p>
      <p>
        <a href="https://forms.office.com/r/KjCRMrfCcA" target="_blank" rel="noopener noreferrer">
          Open Survey 1
        </a>
      </p>
    </section>

    <section id="survey-2" class="hidden" aria-live="polite">
    
      <p>Please complete this survey:</p>
      <p>
        <a href="https://forms.office.com/r/Qz0JYvxRMn" target="_blank" rel="noopener noreferrer">
          Open Survey 2
        </a>
      </p>
    </section>

    <section id="survey-3" class="hidden" aria-live="polite">
  
      <p>Please complete this survey:</p>
      <p>
        <a href="https://forms.office.com/r/s6wM5MW71a" target="_blank" rel="noopener noreferrer">
          Open Survey 3
        </a>
      </p>
    </section>
  </main>

  <script>
    (function () {
      const CACHE_KEY = 'selectedSurveyId';
      const surveys = ['survey-1', 'survey-2', 'survey-3'];

      function getRandomSurveyId() {
        const index = Math.floor(Math.random() * surveys.length);
        return surveys[index];
      }

      function getOrCreateSurveyId() {
        const cachedSurveyId = localStorage.getItem(CACHE_KEY);

        if (cachedSurveyId && surveys.includes(cachedSurveyId)) {
          return cachedSurveyId;
        }

        const newSurveyId = getRandomSurveyId();
        localStorage.setItem(CACHE_KEY, newSurveyId);
        return newSurveyId;
      }

      function showSurvey(surveyId) {
        for (const id of surveys) {
          const section = document.getElementById(id);
          if (!section) continue;

          if (id === surveyId) {
            section.classList.remove('hidden');
          } else {
            section.classList.add('hidden');
          }
        }
      }

      const surveyIdToShow = getOrCreateSurveyId();
      showSurvey(surveyIdToShow);
    })();
  </script>
</body>
</html>
